server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/smart-exam;MODE=MySQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

app:
  jwt-secret: "replace-this-secret-in-production-please-change"
  upload-dir: "./uploads"
  ocr:
    tesseract-command: "tesseract"
  text-extraction:
    zip:
      max-file-count: 20000
      max-entry-size: 536870912
      max-text-size: 536870912
      min-inflate-ratio: 0.0001
  elasticsearch:
    enabled: true
    url: "http://localhost:9200"
    index: "smart_exam_chunks"
