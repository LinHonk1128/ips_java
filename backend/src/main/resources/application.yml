server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_exam?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "111111"
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

app:
  jwt-secret: "replace-this-secret-in-production-please-change"
  upload-dir: "./uploads"
  ocr:
    tesseract-command: "tesseract"
  text-extraction:
    zip:
      max-file-count: 20000
      max-entry-size: 536870912
      max-text-size: 536870912
      min-inflate-ratio: 0.0001
  elasticsearch:
    enabled: true
    url: "http://localhost:9200"
    index: "smart_exam_chunks"
  demo-data:
    enabled: false
  ai:
    chat:
      model: "deepseek-v4-flash"
      endpoint: "https://api.deepseek.com/v1/chat/completions"
      api-key: "sk-cec0ba5aa1fc4cf1932cbf264bba0de5"
    embedding:
      model: "text-embedding-v4"
      endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings"
      api-key: "sk-a3bbd5a93b10442db5353b1e2b0895bd"
      dimensions: 1536
