server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/smart-exam;MODE=MySQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

app:
  jwt-secret: "replace-this-secret-in-production-please-change"
  upload-dir: "./uploads"
  ocr:
    tesseract-command: "tesseract"
